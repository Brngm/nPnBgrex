    <style>
        :root {
            /* ===================================================================== */
            /* PAGE / FOND GENERAL                                                   */
            /* ===================================================================== */
            /*
                pageFond_color : couleur du fond général de la page.
                    black      => fond noir autour du graphe
                    #f9f9f9    => retour au fond clair historique
                    white      => fond blanc

                panelFond_color : couleur des panneaux du haut : scalePanel et scorePanel.

                graphLargeur_reference : largeur commune utilisée par :
                    - scalePanel
                    - scorePanel
                    - toolbar
                    - cadre d'affichage du graphe

                graphEspace_haut : petit espace entre scorePanel et le graphe.
            */
            /* ===================================================================== */

            --pageFond_color: black;
            --panelFond_color: #f9f9f9;
            --graphLargeur_reference: calc(50vw * 1.618);
            --graphEspace_haut: 6px;


            /* ===================================================================== */
            /* LOGO nPnB PROGRAMMABLE                                                 */
            /* ===================================================================== */
            /*
                Le logo est composé de 6 éléments réglables ici :
                    - logoFond
                    - logo-top
                    - logo-left
                    - logo-center
                    - logo-right
                    - logo-text = texte "nPnB"

                Pour chaque signe :

                    *_color  : couleur du signe
                    *_taille : taille relative du signe
                        1.0  = taille normale
                        1.2  = +20%
                        0.8  = -20%

                    *_pos_x  : déplacement horizontal individuel
                        valeur positive => vers la droite
                        valeur négative => vers la gauche

                    *_pos_y  : déplacement vertical individuel
                        valeur positive => vers le bas
                        valeur négative => vers le haut

                logoEntier_* agit sur tout le logo en bloc.
            */
            /* ===================================================================== */

            /* LOGO ENTIER ---------------------------------------------------------- */
            --logoEntier_taille: 70px;
            --logoEntier_pos_x: 105px;
            --logoEntier_pos_y: 10px;

            /* FOND DU LOGO --------------------------------------------------------- */
            --logoFond_color: transparent;

            /* #0D1117 | #A7C957 | #6A994E | #386641 | #BC6C25 | #F2E8CF */
            /* SIGNE DU HAUT -------------------------------------------------------- */
            --logo-top_color: white;
            /*  #E63946 #3A86FF #3A86FF #00D1FF */
            --logo-top_taille: 1.0;
            --logo-top_pos_x: 0px;
            --logo-top_pos_y: 0px;

            /* SIGNE GAUCHE --------------------------------------------------------- */
            --logo-left_color: white;
            /* #2E7FA3 #F77F00   #00FFA3 */
            --logo-left_taille: 1.0;
            --logo-left_pos_x: -70px;
            --logo-left_pos_y: 10px;

            /* SIGNE CENTRAL -------------------------------------------------------- */
            --logo-center_color: white;
            /* #F2D16B #43AA8B #FF4FD8  */
            --logo-center_taille: 1.20;
            --logo-center_pos_x: 2px;
            --logo-center_pos_y: 11px;

            /* SIGNE DROIT ---------------------------------------------------------- */
            --logo-right_color: white;
            /* #4F8A4B #FCBF49 #FFFFFF*/
            --logo-right_taille: 1.0;
            --logo-right_pos_x: 70px;
            --logo-right_pos_y: 10px;

            /* TEXTE nPnB ----------------------------------------------------------- */
            --logo-text_color: #F2E8CF;
            /* */
            --logo-text_taille: 1.6;
            --logo-text_pos_x: 0px;
            --logo-text_pos_y: 0px;
        }

        .float-tooltip-kap {
            background: transparent !important;
            box-shadow: none !important;
            border: none !important;
            padding: 0 !important;

            max-width: 1000px;
            /* <<< LARGMAX : à régler ici */

            white-space: normal;
            /* une seule ligne tant que possible */
            overflow-wrap: break-word;
            /* si un mot est trop long, il est coupé */
            word-break: normal;
            /* ne coupe pas les mots inutilement */
        }


        body {
            /* general layout margins */
            margin-left: 15%;
            margin-right: 0;
            height: 100%;
            font-size: 12px;
            font-family: Arial;
            background: var(--pageFond_color);
        }

        #graph-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
        }

        #NamePedig,

        #scalePanel,
        #scorePanel {
            width: var(--graphLargeur_reference);
            max-width: 100%;
            box-sizing: border-box;
            background: var(--panelFond_color);
            padding-left: 6px;
            padding-right: 6px;
        }

        #scorePanel {
            margin-bottom: var(--graphEspace_haut);
        }

        h1 {
            position: relative;
            margin-top: 0px;
            margin-bottom: 0px;
            margin-left: 0px;
            margin-right: 0px;
            color: #333;
            font-size: 24px;
            margin-top: 0px;
            margin-bottom: 0px;
            margin-left: 0px;
            margin-right: 0px;
            padding: 0px 0px 0px 0px;
        }

        #LOGO_nPnB_svg {
            .float-tooltip-kap {
                white-space: nowrap !important;
            }

            position: absolute;
            top: var(--logoEntier_pos_y);
            left: var(--logoEntier_pos_x);
            width: var(--logoEntier_taille);
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
            overflow: visible;
        }

        #LOGO_nPnB_svg .logo-bg {
            fill: var(--logoFond_color);
        }

        #LOGO_nPnB_svg .logo-top,
        #LOGO_nPnB_svg .logo-left,
        #LOGO_nPnB_svg .logo-center,
        #LOGO_nPnB_svg .logo-right,
        #LOGO_nPnB_svg .logo-text {
            transform-box: fill-box;
            transform-origin: center;
        }

        #LOGO_nPnB_svg .logo-top {
            fill: var(--logo-top_color);
            transform: translate(var(--logo-top_pos_x), var(--logo-top_pos_y)) scale(var(--logo-top_taille));
        }

        #LOGO_nPnB_svg .logo-left {
            fill: var(--logo-left_color);
            transform: translate(var(--logo-left_pos_x), var(--logo-left_pos_y)) scale(var(--logo-left_taille));
        }

        #LOGO_nPnB_svg .logo-center {
            fill: var(--logo-center_color);
            transform: translate(var(--logo-center_pos_x), var(--logo-center_pos_y)) scale(var(--logo-center_taille));
        }

        #LOGO_nPnB_svg .logo-right {
            fill: var(--logo-right_color);
            transform: translate(var(--logo-right_pos_x), var(--logo-right_pos_y)) scale(var(--logo-right_taille));
        }

        #LOGO_nPnB_svg .logo-text {
            fill: var(--logo-text_color);
            font-family: Arial, Helvetica, sans-serif;
            font-weight: 700;
            font-size: 56px;
            transform: translate(var(--logo-text_pos_x), var(--logo-text_pos_y)) scale(var(--logo-text_taille));

        /* DESCRITION SCALES ------------------------------*/
        .scale-button {
            margin-top: 2px;

            font-size: 14px;
            font-weight: bold;

            margin-right: 2px;

            color: white;

            color: white;

        .scale-button.active {
            background-color: #050505;
            color: white;
        }

        /* SCORES -----------------------------------------*/
        .updated.glow {
            /* Gentle animation */
            transform: scale(1.05);
            box-shadow: 0 0 6px rgba(0, 0, 0, 0.25);
        }

        .updated.burst {
            /* More vibrant animation */
            transform: scale(1.18);
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.35);
        }

        #scoreP {
            display: inline-block;
            margin-top: 2px;
            margin-bottom: 4px;
            margin-left: 0px;
            font-weight: bold;
            font-size: 16px;
            color: white;
            background-color: #757575;
            padding: 3px 9px;
            border-radius: 3px;
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .scoreP:hover {
            background-color: #4F4F4F;
            color: white;
        }

        .scoreP.active {
            background-color: #050505;
            color: white;
        }

        .action-blocLDCON h3 {
            margin: 0 0 2px 0;
            font-size: 10px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            text-decoration: underline;
        }

        /* Button line + aligned descriptions + latex*/
        .btn-desc-rowLDCON {
            display: flex;
            gap: 8px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
        }

        .btn-desc-itemLDCON {
            display: flex;
            flex-direction: column;
            max-width: 90px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            /* by default it's wider */
            flex: 1;
        }

        .btn-desc-itemLDCON .ctx-btnLDCON {
            width: 50%;
            padding: 1px 1px;
            color: #eee;
            background: #757575;
            /* #616060;  #757575;  color:#F54927 */
            border-radius: 2px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            box-sizing: border-box;
        }

        .btn-desc-itemLDCON .ctx-btnLDCON:hover {
            background: #4F4F4F;
            color: white;
        }

        .btn-desc-itemLDCON .desc-textLDCON {
            font-size: 11px;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            color: #444;
            text-align: left;
            margin-top: 2px;
            margin-left: 0px;
        }

        /* ------------------------------------------------*/
        /* objects attached to a node*/
        #menuAttachedObj {
            position: absolute;
            display: none;

            background: white;
            color: black;

            width: 300px;

            border: 1px solid #ccc;
            border-radius: 2px;

            padding: 10px;

            font-family: Verdana, Geneva, Tahoma, sans-serif;
            font-size: 12px;

            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);

            z-index: 30;
        }

        /* TOOLBAR ----------------------------------------*/

        #toolbar {
            position: absolute;
            top: 70px;
            left: 0;

            width: var(--graphLargeur_reference);
            max-width: 100%;
            box-sizing: border-box;

            display: grid;
            grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
            align-items: center;

            column-gap: 30px;

            padding-left: 20px;
            padding-right: 20px;
        }

        #toolbar-left,
        #toolbar-middle,
        #toolbar-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        #toolbar-left {
            justify-content: flex-start;
        }

        #toolbar-middle {
            justify-content: center;
        }

        #toolbar-right {
            justify-content: flex-end;
        }
    </style>
</head>

        function RotateCameraStep() {
            const lookAt = STATE.CAMERA.LOOKAT;
            const pos = Graph.cameraPosition();
            const dx = pos.x - lookAt.x;
            const dz = pos.z - lookAt.z;
            const rayon = Math.sqrt(dx * dx + dz * dz);
            const angle = Math.atan2(dz, dx);
            const deltaAngle = (2 * Math.PI) / STATE.R.speed;

            Graph.cameraPosition(
                {
                    x: lookAt.x + rayon * Math.cos(angle + deltaAngle),
                    y: pos.y,
                    z: lookAt.z + rayon * Math.sin(angle + deltaAngle)
                },
                lookAt,
                0
            );
        }

        function myColorNode(id) {
            if (!Gjson.nodes[id].HILITE) {

                }
                if (STATE.p) { return myColorNodeP(group); }

            }
            else {

            }
        };

        function myColorNode_forLinks(id) {
            let group = Gjson.nodes[id].group[STATE.s];
            if (ScaleFrozenColor > -1) { // 
                group = Gjson.nodes[id].group[ScaleFrozenColor]
            }
            if (STATE.p) { return myColorNodeP(group); }
            else { return myColorNodeO(group); }
        };

        function myColorNodeP(group) {
            const x = STATE.PREF.NODE.ColorCoef;
            const color = colorRGB[group[0] % colorRGB.length]
            return [color[0] * x, color[1] * x, color[2] * x]
        };

        function myColorNodeO(group) {
            const x = STATE.PREF.NODE.ColorCoef;
            const l = group.length;
            let r = 0, g = 0, b = 0;
            for (let i = 0; i < l; i++) {
                let [ri, gi, bi] = colorRGB[group[i] % colorRGB.length];
                r += ri; g += gi; b += bi;
            }
            r = Math.round(r / l); g = Math.round(g / l); b = Math.round(b / l);
            return [r * x, g * x, b * x]
        };

        function myColorLink(link) {
            const s = link.source.id;
            const t = link.target.id;
            let c1, c2;
            if (hoverNode) {
                if ((s === hoverNode.id) || (t === hoverNode.id)) {
                    return [255, 255, 255];
                }
            }
            c1 = myColorNode_forLinks(s);
            c2 = myColorNode_forLinks(t);
            const x = STATE.PREF.LINK.ColorCoef;
            return averageColor_rgba([c1[0] * x, c1[1] * x, c1[2] * x], [c2[0] * x, c2[1] * x, c2[2] * x]);
        };

        function averageColor_rgba(c1, c2) {
            return "rgba(" + (c1[0] + c2[0]) / 2.0 + "," + (c1[1] + c2[1]) / 2.0 + "," + (c1[2] + c2[2]) / 2.0 + ","
                + STATE.PREF.LINK.ColorTrans + ")";
        }

        function colorRGB_2_Threejs(rgb) {

        function Barycenter(L = [], Visible = true) {
            let bx = 0;
            let by = 0;
            let bz = 0;
            let N = 0;
            if (L.length === 0) {
                const nodes = Graph.graphData().nodes;
                nodes.forEach(n => {
                    if (Visible ? n.visible : true) {
                        N = N + 1;
                        bx += n.x;
                        by += n.y;
                        bz += n.z;
                    }
                });
            }
            else {
                L.forEach(n => {
                    if (Visible ? n.visible : true) {
                        N = N + 1;
                        bx += n.x;
                        by += n.y;
                        bz += n.z;
                    }
                });
            }
            return { x: bx / N, y: by / N, z: bz / N };
        }

        function CameraLookatBarycenter(L = [], animation = 1000) {
            let X = Barycenter(L)
            Graph.cameraPosition(
                Graph.cameraPosition(), // final camera position
                X, // point that the camera should look at (lookAt)
                animation  // animation duration in milliseconds
            );
            return X;
        }

        function choose_your_preferences(DIC) {
            const prefDoc = getPreferenceDocument();
            const overlay = prefDoc.getElementById("prefOverlay");

            content.innerHTML = "";
            buildForm(content, DIC, "");

        function buildForm(parent, obj, path) {
            const doc = parent.ownerDocument || document;
            Object.keys(obj).forEach(key => {
                const value = obj[key];
                if (
                    typeof value === "object" &&
                    value !== null &&
                    !Array.isArray(value)
                ) {
                    const section = doc.createElement("div");
                    section.className = "prefSection";
                    const title = doc.createElement("div");
                    title.className = "prefSectionTitle";
                    title.textContent = key;
                    section.appendChild(title);
                    parent.appendChild(section);
                    buildForm(
                        section,
                        value,
                        path ? path + "." + key : key
                    );

                }
                else {
                    const row = doc.createElement("div");
                    row.className = "prefRow";
                    const label = doc.createElement("div");
                    label.className = "prefLabel";
                    label.textContent = key;
                    let input;
                    if (typeof value === "boolean") {
                        input = doc.createElement("input");
                        input.type = "checkbox";
                        input.checked = value;
                    }
                    else if (typeof value === "number") {
                        input = doc.createElement("input");
                        input.type = "number";
                        input.step = "any";
                        input.value = value;
                    }
                    else {
                        input = doc.createElement("input");
                        input.type = "text";
                        input.value = value;
                    }
                    input.dataset.path = path ? path + "." + key : key;
                    row.appendChild(label);
                    row.appendChild(input);
                    parent.appendChild(row);
                }
            });
        }

        function savePreferences(DIC) {
            getPreferenceDocument()
                .querySelectorAll("#prefContent input")
                .forEach(input => {
                    const path = input.dataset.path.split(".");
                    let target = DIC;
                    for (let i = 0; i < path.length - 1; i++) {
                        target = target[path[i]];
                    }
                    const lastKey = path[path.length - 1];
                    if (input.type === "checkbox") {
                        target[lastKey] = input.checked;
                    }
                    else {
                        const oldValue = target[lastKey];
                        if (typeof oldValue === "number") {
                            target[lastKey] = Number(input.value);
                        }
                        else {
                            target[lastKey] = input.value;
                        }
                    }
                });
        }

        function makeDraggable(menu, options = {}) {
            let dragging = false;
            let offsetX = 0;
            let offsetY = 0;

            menu.addEventListener("mousedown", (e) => {

                if (
                    options.headerId &&
                    e.target.id !== options.headerId
                ) {
                    return;
                }

                if (
                    options.ignoreInputs &&
                    e.target.tagName === "INPUT"
                ) {
                    return;
                }

                dragging = true;

                offsetX = e.clientX - menu.offsetLeft;
                offsetY = e.clientY - menu.offsetTop;

                if (options.onStart) {
                    options.onStart();
                }

                e.preventDefault();
            });

            document.addEventListener("mousemove", (e) => {

                if (!dragging) return;

                menu.style.left = `${e.clientX - offsetX}px`;
                menu.style.top = `${e.clientY - offsetY}px`;
            });

            document.addEventListener("mouseup", () => {

                if (!dragging) return;

                dragging = false;

                if (options.onEnd) {
                    options.onEnd();
                }
            });
        }

            const screenX = (vec.x * widthHalf) + widthHalf;

        function zoom_on_xyz(x, y, z, distance, ms) {
            if (FOCUS_cross) {
                scene.remove(FOCUS_cross)
            }
            SetRotationActive(false);
            STATE.CAMERA.LOOKAT.x = x
            STATE.CAMERA.LOOKAT.y = y
            STATE.CAMERA.LOOKAT.z = z
            rotationControl.style.border = "transparent";
            const distRatio = 1 + distance / Math.hypot(x, y, z);
            const newPos = x || y || z
                ? { x: x * distRatio, y: y * distRatio, z: z * distRatio }
                : { x: 0, y: 0, z: distance }; // special case if (0,0,0)
            Graph.cameraPosition(
                newPos, // new position
                { x: x, y: y, z: z }, // lookAt ({ x, y, z })
                ms  // ms transition duration
            );
            return cross_forward(x, y, z)
        };


        function addCheckAt(x, y, z, size11, size12, size13, size21, size22, size23, color1, color2) {

            const mat1 = new THREE.MeshBasicMaterial({
                color: color1,
                depthTest: false,
                depthWrite: false,
                transparent: true
            });

            const mat2 = new THREE.MeshBasicMaterial({
                color: color2,
                depthTest: false,
                depthWrite: false,
                transparent: true
            });

            const bar1 = new THREE.Mesh(new THREE.BoxGeometry(size11, size12, size13), mat1);
            const bar2 = new THREE.Mesh(new THREE.BoxGeometry(size21, size22, size23), mat2);

            // very high rendering order
            bar1.renderOrder = 9999;
            bar2.renderOrder = 9999;

            const cross = new THREE.Group();
            cross.add(bar1);
            cross.add(bar2);

            // draw AFTER everything else
            cross.renderOrder = 9999;

            // clear the depth buffer
            cross.onBeforeRender = (renderer) => {
                renderer.clearDepth();
            };

            cross.position.set(x, y, z);
            return cross;
        };

        function cross_forward(x, y, z,
            size11 = 100, size12 = 1, size13 = 1,
            size21 = 1, size22 = 100, size23 = 1,
            color1 = 'black', color2 = 'white') {

            const cross = addCheckAt(x, y, z, size11, size12, size13, size21, size22, size23, color1, color2);
            scene.add(cross);
            setTimeout(() => {
                scene.remove(cross);
            }, 3000);
            return cross;
        };

        function init_nodeThreeObject() {
            Graph.nodeThreeObject(node => {

        function FreezeGraph() {
            Graph.graphData().nodes.forEach(n => {
                n.fx = n.x;
                n.fy = n.y;
                n.fz = n.z;
            });
        }

        function UnFreezeGraph() {
            Graph.graphData().nodes.forEach(n => {
                n.fx = undefined;
                n.fy = undefined;
                n.fz = undefined;
            });
        }

        function onGraphEngineStop() {

            if (!freezeAfterSimulation) {
                return;
            }

            freezeAfterSimulation = false;

            Graph.graphData().nodes.forEach(n => {
                n.fx = n.x;
                n.fy = n.y;
                n.fz = n.z;
            });

            Graph.onEngineStop(() => { });

            STATE.PLOT.stable = true;
        }

        function PLOT_Vastur_Geometry_Unaware(L = []) {
            let freezeAfterSimulation = true;
            Graph.onEngineStop(() => {
                if (!freezeAfterSimulation) { return };
                freezeAfterSimulation = false;
                FreezeGraph()
                Graph.onEngineStop(() => { }); // disables the callb-ack
            });

            epsilon = 1, stableTicks = 5;
            let stableCount = 0;
            let prev = [];

            let NodeVis = [];
            for (let i = 0; i < Gjson.nodes.length; i++) {
                NodeVis.push(i);
            }
            for (let i = 0; i < NodeVis.length; i++) {
                prev.push([Gjson.nodes[NodeVis[i]].x, Gjson.nodes[NodeVis[i]].y, Gjson.nodes[NodeVis[i]].z])
            }
            let COUNTER = 0;

            function loop() {
                if (working) {
                    working.style.display = "block";

                    working.innerHTML =
                        "Computing the 3D Graph Geometry<br>"
                        + "<b>Unawaring the description scales</b>"
                        + "<br>ITERATION: " + COUNTER;
                }

                let maxDisp = 0;
                let px = 0, py = 0, pz = 0;
                for (let i = 0; i < NodeVis.length; i++) {
                    n = Gjson.nodes[NodeVis[i]]
                    px = prev[i][0]; py = prev[i][1]; pz = prev[i][2];

                    const dx = n.x - px;
                    const dy = n.y - py;
                    const dz = n.z - pz;
                    const disp = Math.sqrt(dx * dx + dy * dy + dz * dz);

                    if (disp > maxDisp) maxDisp = disp;

                    prev[i] = [n.x, n.y, n.z]
                }

                if (maxDisp < epsilon) {
                    stableCount++
                }
                else {
                    stableCount = 0
                    COUNTER = COUNTER + 1
                };

                if (stableCount >= stableTicks) {
                    Graph.graphData().nodes.forEach(n => {
                        n.fx = n.x;
                        n.fy = n.y;
                        n.fz = n.z;

                        // Geometry cluster-unaware
                        n.g0x = n.x;
                        n.g0y = n.y;
                        n.g0z = n.z;
                    });

                    FreezeGraph();
                    STATE.PLOT.stable = true;
                    STATE.CAMERA0.POSITION = Graph.cameraPosition();
                    STATE.CAMERA0.LOOKAT = CameraLookatBarycenter(L, animation = 1000);

                    init_nodeThreeObject()

                    Graph.enableNodeDrag(false)

                    Graph.backgroundColor(STATE.PREF.BACKGROUND.backgroundColor);
                    RefreshGraphObjectsDirect();

                    document.getElementById('loading').style.display = 'none';
                    return;
                }
                requestAnimationFrame(loop);
            }
            loop();
        };

        function PLOT_Vastur() {
            freezeAfterSimulation = true;
            if (STATE.PLOT.aware) {
                UnFreezeGraph()
                // Force of attraction cluster-aware
                const linkForce = Graph.d3Force('link');
                linkForce.strength(link => {
                    const ns = link.source;
                    const nt = link.target;
                    const group1 = ns.group[STATE.s][0];
                    const group2 = nt.group[STATE.s][0];
                    if (group1 === group2) {
                        return link.value * 1.0; // same cluster => strong attraction
                    }
                    return link.value * (0.75 ** STATE.PLOT.coef_weak_strength) // weak attraction otherwise
                    /*
                    // just a joke (A topsy-turvy world) ;-)
                    if (group1 === group2) {
                        return link.value * (0.5 ** STATE.PLOT.coef_weak_strength) // weak attraction otherwise
                    }
                    return link.value * 1.0 // weak attraction otherwise
                    */
                });
            }
            else {
                Graph.graphData().nodes.forEach(n => {
                    n.x = n.g0x;
                    n.y = n.g0y;
                    n.z = n.g0z;

                    n.fx = n.g0x;
                    n.fy = n.g0y;
                    n.fz = n.g0z;
                });

            }
            Reheat()
        };

        function RefreshNodeVisibility() {
            //console.log("RefreshNodeVisibility()")
            UPDATE_FOCUS()
            // NODES
            const nodes = Graph.graphData().nodes;
            let NBVIZNODE = 0;
            let MOD_VIZ = []
            let MOD_ALL = []
            for (let node of nodes) {

                NBVIZNODE += node.visible ? 1 : 0;
                MOD_ALL.push(Gjson.nodes[node.id].group[STATE.s][0])
                if (node.visible) {
                    MOD_VIZ.push(Gjson.nodes[node.id].group[STATE.s][0])
                }


                if (node.labelSprite) {
                    node.labelSprite.textHeight =
                        node.BigLab
                            ? 2 * STATE.PREF.LABEL.sizeFixed
                            : STATE.PREF.LABEL.sizeFixed;
                }
                if (!node.__sphere) continue;
                node.__sphere.visible = node.visible;
                if (node.labelSprite) {
                    node.labelSprite.visible =
                        node.visible && node.LabVis;
                }
            }

            STATE.PLOT.nbVisibleNodes = NBVIZNODE;

            MOD_VIZ = [...new Set(MOD_VIZ)]
            MOD_ALL = [...new Set(MOD_ALL)]
            STATE.PLOT.nbVisibleModules = MOD_VIZ.length;

            document.querySelector("#NamePedig").innerHTML =
                myTitle +
                " (Vis. Nodes: " + NBVIZNODE + "/" + Gjson.nodes.length + ", "
                + "Vis. Modules: " + MOD_VIZ.length + "/" + MOD_ALL.length + ")"
            renderMathInElement(document.querySelector("#NamePedig"));

            // LINKS
            const visibleMap = {};
            nodes.forEach(node => {
                visibleMap[node.id] = node.visible;
            });

            Graph.graphData().links.forEach(link => {

                const sid = typeof link.source === "object"
                    ? link.source.id
                    : link.source;

                const tid = typeof link.target === "object"
                    ? link.target.id
                    : link.target;

                link.visible =
                    visibleMap[sid] && visibleMap[tid];
            });
            // Important:
            // Hiding the THREE object is not enough for 3d-force-graph picking.
            // The graph engine must also re-read node.visible so invisible nodes
            // are not hoverable/clickable.
            Graph.nodeVisibility(node => node.visible);
        }

            Graph.graphData().nodes.forEach(node => {

            //console.log("RefreshLinkVisibility()")
            const visibleMap = {};

            Graph.graphData().nodes.forEach(node => {

            });

        function BuildSelection(D) {
            // {T:T, ARO:ARO, ID:clickedNodeId, s:STATE.s, a:"", b:""}
            const T = D.T; // "ME", "NEIG", "PROX", "MOD", "DEG", "LAB"
            const ARO = D.ARO; // "ADD", "REM", "ONL"
            const ID = D.ID; // ID is the id node
            const s = D.s; // WHEN T="MOD" --> s is the index of scale description 
            const a = D.a; // WHEN T="DEG" --> a is the STRmin_deg, WHEN T="LAB" --> a is the STRregex
            const b = D.b; // WHEN T="DEG" --> a is the STRmax_deg

            let selection = []
            switch (T) {
                case "ME": // Me
                    selection.push(ID);
                    return ["", selection]
                    break;

                case "NEIG": // My neighbors & Me
                    const myN = myNeig_V_UNV(ID);
                    selection = [].concat(myN[0], myN[1]); // My neighbors
                    selection.push(ID); // Me
                    return ["", selection]
                    break;

                case "PROX": // My proxemie
                    //TODO
                    break;

                case "MOD": // My CURRENTLY selected Cp Module
                    const myCpM = myCpModuleNode_V_UNV(ID, s);
                    selection = [].concat(myCpM[0], myCpM[1]);
                    return ["", selection]
                    break;

                case "DEG": // degrees
                    const min = parseInt(a); const max = parseInt(b);
                    for (let i = 0; i < Gjson.nodes.length; i++) {
                        if ((min <= Gjson.nodes[i].neighbors.length) && (Gjson.nodes[i].neighbors.length <= max)) {
                            selection.push(i);
                        }
                    }
                    return ["", selection]
                    break;

                case "LAB": // labels

                    try {
                        const regex = new RegExp(a, "u");

                        for (let i = 0; i < Gjson.nodes.length; i++) {
                            if (regex.test(Gjson.nodes[i].name)) {
                                selection.push(i);
                            }
                        }
                        return ["", selection]

                    } catch (e) {
                        return [e.message, selection]
                    }
                    break;

                case "CpMODofNodeVis": // The Modules
                    selection = []
                    for (let i = 0; i < Gjson.nodes.length; i++) {
                        if (getNod_visible(i)) {
                            const myCpM = myCpModuleNode_V_UNV(i, s);
                            selection = selection.concat(myCpM[0], myCpM[1]);
                        }
                    }
                    selection = [...new Set(selection)]
                    break;
            }
            return ["", selection]
        }

        function MakeOneBack() {
            // Rebuild visibility state from history, then update the graph once.

            // 1) Reset data state.
            for (let id = 0; id < Gjson.nodes.length; id++) {
                setNod_visible_Silent(id, true);
            }

            // 3) Replay remaining actions without visual refresh.
            for (let i = 1; i < STATE.lback.length - 1; i++) {
                const D = STATE.lback[i];
                const Builded = BuildSelection(D);
                Upate_ARO_selection_visible(D.ARO, Builded[1]);
            }

            // 2) Remove the last visibility action.
            if (STATE.lback.length > 1) {
                STATE.lback.pop();
            }

            // 4) Update visuals exactly once.
            RefreshVisibility();
        };

        function normalizeNodeSelection(selection) {
            // Keep only valid integer node ids, remove duplicates.
            return [
                ...new Set(
                    selection
                        .map(id => Number(id))
                        .filter(id =>
                            Number.isInteger(id) &&
                            id >= 0 &&
                            id < Gjson.nodes.length
                        )
                )
            ];
        }

        function Upate_ARO_selection_visible(ARO, selection) {
            selectedSet = new Set(selection);

            switch (ARO) {
                case "ADD":
                    selection.forEach(id => {
                        setNod_visible_Silent(id, true);
                    });
                    break;

                case "REM":
                    selection.forEach(id => {
                        setNod_visible_Silent(id, false);
                    });
                    break;

                case "ONL":
                    Gjson.nodes.forEach(node => {
                        setNod_visible_Silent(
                            node.id,
                            node.visible && selectedSet.has(node.id)
                        );
                    });
                    break;

                default:
                    console.warn("Unknown visibility mode:", ARO);
                    return;
            }
        }

                dragging = true;

                offsetX = event.clientX - popup.offsetLeft;
                offsetY = event.clientY - popup.offsetTop;

                event.preventDefault();
                event.stopPropagation();
            });

            document.addEventListener("mousemove", event => {
                if (!dragging) {
                    return;
                }

                popup.style.left = `${event.clientX - offsetX}px`;
                popup.style.top = `${event.clientY - offsetY}px`;
            });

            document.addEventListener("mouseup", () => {
                dragging = false;

        function setupDockPanels(win) {
            const doc = win.document;
            let topZ = 10;

            function bringToFront(panel) {
                panel.style.zIndex = ++topZ;
            }

            doc.querySelectorAll(".MIAPdock-panel").forEach(panel => {
                bringToFront(panel);

                panel.addEventListener("mousedown", () => bringToFront(panel));

                const iconBtn = panel.querySelector(".MIAPdock-iconify");
                if (iconBtn) {
                    iconBtn.addEventListener("click", event => {
                        event.preventDefault();
                        event.stopPropagation();
                        panel.classList.toggle("is-iconified");
                        iconBtn.textContent = panel.classList.contains("is-iconified") ? "□" : "_";
                    });
                }

                const header = panel.querySelector(".MIAPdock-header");
                if (!header) return;

                header.addEventListener("mousedown", event => {
                    if (event.target.closest("button")) return;
                    event.preventDefault();
                    bringToFront(panel);

                    const body = doc.querySelector(".FOCUSpanel-body");
                    const bodyRect = body.getBoundingClientRect();
                    const panelRect = panel.getBoundingClientRect();
                    const dx = event.clientX - panelRect.left;
                    const dy = event.clientY - panelRect.top;

                    function onMove(moveEvent) {
                        const maxLeft = Math.max(0, body.clientWidth - panel.offsetWidth);
                        const maxTop = Math.max(0, body.clientHeight - panel.offsetHeight);
                        let left = moveEvent.clientX - bodyRect.left - dx;
                        let top = moveEvent.clientY - bodyRect.top - dy;
                        left = Math.max(0, Math.min(left, maxLeft));
                        top = Math.max(0, Math.min(top, maxTop));
                        panel.style.left = left + "px";
                        panel.style.top = top + "px";
                    }

                    function onUp() {
                        doc.removeEventListener("mousemove", onMove);
                        doc.removeEventListener("mouseup", onUp);
                    }

                    doc.addEventListener("mousemove", onMove);
                    doc.addEventListener("mouseup", onUp);
                });
            });
        }

        function setupFocusPanelWhenReady(win, attempt = 0) {
            if (!win || win.closed) {
                return;
            }

            const doc = win.document;
            const panel = doc.querySelector(".FOCUSpanel");

            if (!panel) {
                if (attempt < 20) {
                    setTimeout(() => setupFocusPanelWhenReady(win, attempt + 1), 50);
                }
                return;
            }

            if (win.__MIAP_focusReady) {
                return;
            }

            FOCUS_IDS.forEach(focusId => {
                const popup = doc.querySelector(`.FOCUSpopup[data-focus-id="${focusId}"]`);

                popup.querySelector(".FOCUSinput")
                    .addEventListener("keydown", event => CLICK_FOCUSinputStr(event, focusId));

                popup.querySelector(".FOCUS_GO")
                    .addEventListener("click", () => CLICK_FOCUS_GO(focusId));

                popup.querySelectorAll(".FOCUSbuttonFree")
                    .forEach(btn => {
                        btn.addEventListener("click", function () {
                            CLICK_FOCUSbuttons_btn(this, focusId);
                        });
                    });

                initFocusCompletion(focusId);
            });

            const prefApply = doc.getElementById("prefApply");
            const prefReset = doc.getElementById("prefReset");

            if (prefApply) {
                prefApply.addEventListener("click", () => {
                    savePreferences(STATE.PREF);
                    APPLY_PREF();
                });
            }

            if (prefReset) {
                prefReset.addEventListener("click", () => {
                    resetPreferences();
                });
            }

            setupDockPanels(win);
            choose_your_preferences(STATE.PREF);

            panel.style.pointerEvents = "auto";
            panel.style.opacity = "1";

            const loading = doc.getElementById("FOCUS_loading");
            if (loading) {
                loading.remove();
            }

            win.__MIAP_focusReady = true;

            FOCUS_IDS.forEach(focusId => {
                if (win.__MIAP_pendingOpenFocus?.[focusId]) {
                    activateExternalFocusWindow(focusId);
                }
            });

            win.__MIAP_pendingOpenFocus = {};
        }

        function activateExternalFocusWindow(focusId = FOCUS_1_ID) {
            const win = getFocusPanelWindow();

            if (!win || !win.__MIAP_focusReady) {
                if (win) {
                    if (!win.__MIAP_pendingOpenFocus) {
                        win.__MIAP_pendingOpenFocus = {};
                    }

                    win.__MIAP_pendingOpenFocus[focusId] = true;
                }

                return false;
            }

            resetFocusState(focusId, true);

            const input = getFocusInput(focusId);
            const inputCom = getFocusInputCom(focusId);
            const result = getFocusResult(focusId);

            getFocusPopup(focusId).style.display = "flex";

            getFocusPopup(focusId)
                .querySelectorAll(".FOCUStable button")
                .forEach(b => b.classList.remove("active"));

            result.textContent = "";
            input.value = "";
            inputCom.textContent = "";

            return true;
        }

        function closeFocusPanel() {
            const win = getFocusPanelWindow();

            FOCUS_IDS.forEach(focusId => {
                resetFocusState(focusId, false);
                setFocusButtonActive(focusId, false);
            });

            if (win) {
                win.close();
            }

            STATE.FOCUS_PANEL_WINDOW = null;
        }

        function closeAllExternalFocusWindows() {
            closeFocusPanel();
        }

        window.addEventListener("beforeunload", closeAllExternalFocusWindows);
        window.addEventListener("pagehide", closeAllExternalFocusWindows);

        function openExternalFocus(focusId = FOCUS_1_ID) {
            let win = getFocusPanelWindow();

            if (!win) {
                const g = getFocusPanelGeometry();

                win = window.open(
                    "",
                    "FOCUS_PANEL",
                    `width=${g.width},height=${g.height},left=${g.left},top=${g.top},resizable=yes,scrollbars=yes`
                );

                if (!win) {
                    console.warn("External FOCUS_PANEL window blocked");
                    resetFocusState(focusId, false);
                    setFocusButtonActive(focusId, false);
                    return;
                }

                STATE.FOCUS_PANEL_WINDOW = win;
                writeFocusPanelDocument(win);

                win.addEventListener("beforeunload", () => {
                    FOCUS_IDS.forEach(id => {
                        resetFocusState(id, false);
                        setFocusButtonActive(id, false);
                    });

                    STATE.FOCUS_PANEL_WINDOW = null;
                });
            }

            activateExternalFocusWindow(focusId);
            setFocusButtonActive(FOCUS_1_ID, true);
            setFocusButtonActive(FOCUS_2_ID, true);
        }

        function closeExternalFocus(focusId = FOCUS_1_ID) {
            const popup = getFocusPopup(focusId);

            resetFocusState(focusId, false);
            setFocusButtonActive(focusId, false);

            if (popup) {
                popup.style.display = "none";
            }

            if (!isAnyFocusOpen()) {
                closeFocusPanel();
            }
        }

        function openFocus(focusId = FOCUS_1_ID) {
            if (STATE.FOCUS_MODE === "external") {
                openExternalFocus(focusId);
                return;
            }

            openInternalFocus(focusId);
        }

        function closeFocus(focusId = FOCUS_1_ID) {
            if (STATE.FOCUS_MODE === "external") {
                closeExternalFocus(focusId);
                return;
            }

            closeInternalFocus(focusId);
            setFocusButtonActive(focusId, false);
        }

        function getFocusButton(focusId = FOCUS_1_ID) {
            return document.querySelector('.FOCUSopenBtn');
        }

        function setFocusButtonActive(focusId = FOCUS_1_ID, active = false) {
            const btn = getFocusButton(focusId);

            if (!btn) {
                return;
            }

            btn.style.border =
                active
                    ? "2px solid white"
                    : "transparent";
        }

        function isFocusOpen(focusId = FOCUS_1_ID) {
            if (STATE.FOCUS_MODE === "external") {
                const win = getFocusPanelWindow();

                if (!win || !win.__MIAP_focusReady) {
                    return false;
                }

                const popup = getFocusPopup(focusId);
                return popup && popup.style.display !== "none";
            }

            const popup = document.querySelector(`.FOCUSpopup[data-focus-id="${focusId}"]`);
            return popup && popup.style.display === "block";
        }

        function isAnyFocusOpen() {
            return FOCUS_IDS.some(focusId => isFocusOpen(focusId));
        }

        function CLICK_FOCUSbtn(focusId = FOCUS_1_ID) {

            if (STATE.FOCUS_MODE === "external" && getFocusPanelWindow()) {
                closeFocusPanel();
                return;
            }

            openFocus(FOCUS_1_ID);
            openFocus(FOCUS_2_ID);
            choose_your_preferences(STATE.PREF);

            setFocusButtonActive(FOCUS_1_ID, true);
            setFocusButtonActive(FOCUS_2_ID, true);
        }

        function CLICK_FOCUScloseBtn(focusId = FOCUS_1_ID) {
            closeFocus(focusId);
        }

        function focusNodeLabel(id) {

            if (typeof myIdLabelString === "function") {
                return myIdLabelString(id);
            }

            const n = Gjson.nodes[id];
            return id + ":" + n.name;
        }

        function FOCUSinputStrOK(str, focusId = FOCUS_1_ID) {

            const choice =
                getFocusPopup(focusId)
                    .querySelector(`input[name="${focusId}_FOCUSchoix"]:checked`)
                    .value;

            if (choice === "ID") {

                const myid = parseInt(str);

                if (
                    isNaN(myid) ||
                    myid < 0 ||
                    myid > Gjson.nodes.length - 1
                ) {
                    return [false, -1, "ID missing"];
                }

                return [
                    true,
                    myid,
                    focusNodeLabel(myid)
                ];
            }

            const candidates = [];
            let candidatesStr = "";

            for (let i = 0; i < Gjson.nodes.length; i++) {

                if (Gjson.nodes[i].name === str) {

                    candidatesStr +=
                        (candidates.length === 0 ? "" : ", ")
                        + focusNodeLabel(i);

                    candidates.push(i);
                }
            }

            if (candidates.length === 0) {
                return [false, -1, "LABEL missing"];
            }

            if (candidates.length > 1) {
                return [
                    false,
                    -1,
                    "several labels: " + candidatesStr
                ];
            }

            return [
                true,
                candidates[0],
                focusNodeLabel(candidates[0])
            ];
        }

        function UPDATE_FOCUSsuggestions(focusId = FOCUS_1_ID) {

            const input = getFocusInput(focusId);
            const suggestions = getFocusSuggestions(focusId);

            const choice =
                getFocusPopup(focusId)
                    .querySelector(`input[name="${focusId}_FOCUSchoix"]:checked`)
                    .value;

            if (choice !== "LABEL") {
                suggestions.style.display = "none";
                return;
            }

            const str = input.value.trim();

            if (str === "") {
                suggestions.style.display = "none";
                return;
            }

            const matches =
                Gjson.nodes
                    .filter(node => node.name.includes(str))
                    .slice(0, 20);

            suggestions.innerHTML = "";

            if (matches.length === 0) {
                suggestions.style.display = "none";
                return;
            }

            matches.forEach(node => {
                const item = document.createElement("div");

                item.className = "FOCUS-suggestion-item";
                item.textContent = node.name;

                item.addEventListener("mousedown", event => {
                    event.preventDefault();
                    event.stopPropagation();

                    input.value = node.name;
                    suggestions.style.display = "none";

                    CLICK_FOCUSinputStr({ key: "Enter" }, focusId);
                });

                suggestions.appendChild(item);
            });

            suggestions.style.display = "block";
        }

        function initFocusCompletion(focusId = FOCUS_1_ID) {

            const input = getFocusInput(focusId);

            input.addEventListener("input", () => UPDATE_FOCUSsuggestions(focusId));

            getFocusPopup(focusId)
                .querySelectorAll(`input[name="${focusId}_FOCUSchoix"]`)
                .forEach(radio => {
                    radio.addEventListener("change", () => {
                        getFocusSuggestions(focusId).style.display = "none";
                    });
                });
        }

        function CLICK_FOCUSinputStr(e, focusId = FOCUS_1_ID) {

            if (e.key !== "Enter") {
                return;
            }

            const focusState = getFocusState(focusId);
            const input = getFocusInput(focusId);
            const inputCom = getFocusInputCom(focusId);
            const suggestions = getFocusSuggestions(focusId);

            const str = input.value.trim();

            if (str === "") {

                inputCom.textContent =
                    "Please enter a node reference.";

                UPDATE_FOCUSresult(-1, focusId);

                return;
            }

            const X = FOCUSinputStrOK(str, focusId);

            if (X[0]) {

                focusState.validNode = true;
                focusState.id = X[1];

                inputCom.textContent = X[2] + (getNod_visible(X[1]) ? "" : " (Unvisible)");
                UPDATE_FOCUSresult(X[1], focusId);
            }
            else {

                focusState.btn = "";
                focusState.validNode = false;
                focusState.id = -1;

                inputCom.textContent = X[2];

                UPDATE_FOCUSresult(-1, focusId);
            }

            suggestions.style.display = "none";
        }

        function CLICK_FOCUSbuttons_btn(me, focusId = FOCUS_1_ID) {

            const focusState = getFocusState(focusId);
            const inputCom = getFocusInputCom(focusId);

            if (!focusState.validNode) {

                inputCom.textContent =
                    "invalid reference";

                resetFocusState(focusId, true);

                UPDATE_FOCUSresult(-1, focusId);

                return;
            }

            const TABi = parseInt(me.dataset.i);
            const TABj = parseInt(me.dataset.j);
            const CHOIX = TABi + "-" + TABj;

            getFocusPopup(focusId).style.display = "flex";

            getFocusPopup(focusId)
                .querySelectorAll(".FOCUStable button")
                .forEach(b => {
                    if (b === me) {
                        b.classList.add("active");
                    }
                    else {
                        b.classList.remove("active");
                    }
                });

            focusState.btn = CHOIX;

            UPDATE_FOCUSresult(focusState.id, focusId);
        }

        function CLICK_FOCUS_GO(focusId = FOCUS_1_ID) {
            const focusState = getFocusState(focusId);
            const inputCom = getFocusInputCom(focusId);

            if (!focusState.validNode) {

                inputCom.textContent =
                    "invalid reference";

                UPDATE_FOCUSresult(-1, focusId);

                return;
            }

            const myid = focusState.id;

            if (!getNod_visible(myid)) {
                setNod_visible_Silent(myid, true);
                STATE.lback.push({ T: "ME", ARO: "ADD", ID: myid, s: STATE.s, a: "", b: "" });
                RefreshVisibility();
            }
            const n = Gjson.nodes[myid];
            FOCUS_cross = zoom_on_xyz(
                n.x,
                n.y,
                n.z,
                100,
                1000
            );
        }

        function UPDATE_FOCUSresult(myid, focusId = FOCUS_1_ID) {

            const focusState = getFocusState(focusId);
            const result = getFocusResult(focusId);

            if (myid === -1) {

                result.innerHTML = "";

                getFocusPopup(focusId)
                    .querySelectorAll(".FOCUStable button")
                    .forEach(b => b.classList.remove("active"));

                return;
            }

            switch (focusState.btn) {

                case "":
                    result.innerHTML = "";
                    break;

                case "0-0":
                    if (typeof myLNeigS === "function") {
                        result.innerHTML = myLNeigS(myid);
                    }
                    else {
                        result.innerHTML = "myLNeigS() missing";
                    }
                    break;

                case "0-1":
                    if (typeof MyCpModString === "function") {
                        result.innerHTML = MyCpModString(myid);
                    }
                    else {
                        result.innerHTML = "MyCpModString() missing";
                    }
                    break;
            }
        }
    </script>
</body>
